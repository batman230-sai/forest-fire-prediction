model_trainer:
  Linear_Regression: {}
  
  Ridge_Regression:
    alpha: 1.0
    
  Lasso_Regression:
    alpha: 0.1

  SVR:
    kernel: 'rbf'
    C: 1.0
    
  Random_Forest:
    n_estimators: 100
    max_depth: 10
    min_samples_split: 2
    random_state: 42

  XGBoost:
    learning_rate: 0.1
    n_estimators: 100
    max_depth: 3

model_optimization:
  Ridge:
    alpha: [0.01, 0.1, 1.0, 10.0, 100.0]
    solver: ['auto', 'svd', 'cholesky', 'lsqr', 'sparse_cg', 'sag', 'saga']