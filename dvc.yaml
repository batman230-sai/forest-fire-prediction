# dvc.yaml
stages:
  data_ingestion:
    cmd: python src/components/Data_Ingestion.py
    deps:
      - src/components/Data_Ingestion.py
      # If your ingestion script reads a specific raw dataset, add it here:
      # - notebooks/Algerian_forest_fires_dataset_UPDATE.csv 
    outs:
      - artifacts/train.csv
      - artifacts/test.csv

  data_transformation:
    cmd: python src/components/Data_Transformation.py
    deps:
      - src/components/Data_Transformation.py
      - artifacts/train.csv
      - artifacts/test.csv
    outs:
      - artifacts/preprocessor.pkl
      # Depending on how your code works, you might output arrays or transformed CSVs here.
      # Update these paths to match exactly what Data_Transformation.py saves.

  model_trainer:
    cmd: python src/components/Model_Trainer.py
    deps:
      - src/components/Model_Trainer.py
      - artifacts/preprocessor.pkl
    params:
      # This tells DVC to track these specific parameters
      - model_trainer.n_estimators
      - model_trainer.max_depth
      - model_trainer.min_samples_split
    outs:
      - artifacts/model.pkl