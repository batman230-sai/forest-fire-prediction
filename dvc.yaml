stages:
  training_pipeline:
    cmd: python -m src.components.Data_Ingestion
    deps:
      # Track all the scripts so DVC knows to rerun if ANY code changes
      - src/components/Data_Ingestion.py
      - src/components/Data_Transformation.py
      - src/components/Model_Trainer.py
      # (Optional) Add your raw dataset path here if it's inside your repo
      # - notebooks/Algerian_forest_fires_dataset_UPDATE.csv 
    params:
      # Track your YAML parameters
      - model_trainer.n_estimators
      - model_trainer.max_depth
      - model_trainer.min_samples_split
    outs:
      # List all artifacts generated by the entire pipeline
      - artifacts/train.csv
      - artifacts/test.csv
      - artifacts/preprocessor.pkl
      - artifacts/model.pkl